name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "AgenticMail Enterprise version (run `npx @agenticmail/enterprise --version`)"
      placeholder: "0.5.320"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Type
      options:
        - Cloud (agenticmail.io)
        - Self-hosted (Docker)
        - Self-hosted (npm)
        - Local development
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - PostgreSQL (Supabase)
        - PostgreSQL (Neon)
        - PostgreSQL (other)
        - SQLite
        - MySQL
        - Turso
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (redact sensitive info).
      render: shell
