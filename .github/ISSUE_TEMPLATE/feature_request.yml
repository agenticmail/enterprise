name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature! Please describe what you'd like.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Agent Runtime
        - Microsoft 365 Integration
        - Google Workspace Integration
        - Task Pipeline
        - DLP / Compliance
        - Authentication / SSO
        - Database
        - Deployment
        - API
        - Documentation
        - Other
    validations:
      required: true
